name: Localee
options:
  bundleIdPrefix: ru.localee
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
    INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Карта показывает места рядом с вами."
targets:
  Localee:
    type: application
    platform: iOS
    sources:
      - path: Localee
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ru.localee.app
        INFOPLIST_KEY_CFBundleDisplayName: Localee
