name: Localee
options:
  bundleIdPrefix: ru.localee
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
    INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Карта показывает места рядом с вами."
packages:
  # Яндекс MapKit — бесплатная версия Lite (карта, метки, геометрия, геопозиция).
  # Платная Full нужна только под поиск/геокодер/построение маршрутов по дорогам.
  YandexMapsMobileLite:
    url: https://github.com/yandex/mapkit-ios-lite
    exactVersion: 4.42.0
targets:
  Localee:
    type: application
    platform: iOS
    sources:
      - path: Localee
    dependencies:
      - package: YandexMapsMobileLite
        product: YandexMapsMobileLite
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ru.localee.app
        INFOPLIST_KEY_CFBundleDisplayName: Localee
        # Обязательно для Яндекс MapKit: SDK статический, а setApiKey и другие
        # методы лежат в Objective-C категориях. Без -ObjC линковщик их
        # выбрасывает, и приложение падает при старте с «unrecognized selector».
        OTHER_LDFLAGS: -ObjC
